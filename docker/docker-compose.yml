services:
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: medagent-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://localhost:5000
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: medagent
      VITE_KEYCLOAK_CLIENT_ID: medagent-frontend
      VITE_KEYCLOAK_ADMIN_ROLE: admin
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - backend
    depends_on:
      backend:
        condition: service_started
      keycloak:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: medagent-backend
    working_dir: /src
    ports:
      - "5000:5000"
    environment:
      MODE: update   # "build" or "update"
      BACKEND_LOG__FILE_PATH: /logs/backend.log
      # Keycloak and auth settings
      OIDC_ALLOWED_ISSUERS: "http://localhost:8080/realms/medagent,http://keycloak:8080/realms/medagent,http://127.0.0.1:8080/realms/medagent"
      OIDC_ISSUER: http://keycloak:8080/realms/medagent
      OIDC_JWKS_URL: "http://keycloak:8080/realms/medagent/protocol/openid-connect/certs"
      OIDC_AUDIENCE: medagent-backend
      OIDC_VERIFY_AUDIENCE: "false"
      KEYCLOAK_REALM: medagent
      KEYCLOAK_CLIENT_ID: medagent-backend
      # MongoDB setting
      MONGODB_URI: mongodb://${MONGODB_ROOT_USERNAME}:${MONGODB_ROOT_PASSWORD}@medagent-mongodb:27017
      MONGODB_DB_NAME: ${MONGODB_DB_NAME}
      GUIDELINE_PDF_FOLDER: /data/guidelines/pdfs
      # Vector DB + HuggingFace
      BGE_M3_MODEL_NAME: BAAI/bge-m3
      HF_HOME: /models/huggingface
      TRANSFORMERS_CACHE: /models/huggingface/transformers
      WEAVIATE_URL: http://weaviate:8080
      WEAVIATE_GRPC_URL: http://weaviate:50051
      # SNOMED CT setting
      SNOMED_BASE_URL: http://snomed-lite:8080/fhir
    volumes:
      - ../backend/src:/src
      - ../logs/backend:/logs
      - ../data/guideline_pdf:/data
      - ../data/huggingface-cache:/models/huggingface
    networks:
      - backend
    depends_on:
      keycloak:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      snomed-lite:
        condition: service_started

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.30.0
    container_name: medagent-weaviate
    ports:
      - "8082:8080"
      - "50052:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - ../data/weaviate-data:/var/lib/weaviate:rw
    restart: on-failure:0
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready" ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-db:
    image: postgres:16
    container_name: medagent-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - ../data/keycloak:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: medagent-keycloak
    mem_limit: 1g
    command: [ "start", "--http-enabled=true", "--hostname=localhost", "--hostname-strict=false" ]
    depends_on:
      - keycloak-db
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
      - "9000:9000"
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks:
      - backend

  mongodb:
    image: mongo:8.0
    container_name: medagent-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD}
    volumes:
      - ../data/mongodb-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  snomed-lite:
    image: snomedinternational/snowstorm-lite:2.3.0
    user: "0"
    command: >
      --index.path=lucene-index/data
      --admin.password=${SNOMED_ADMIN_PASSWORD}
    ports:
      - "8081:8080"
    volumes:
      - snowstorm-lite-volume:/app/lucene-index
    networks:
      backend:
        aliases:
          - snomed-lite

  snomed-loader:
    # !! REQUIRES SNOMED CT zip files in correct location
    image: curlimages/curl:8.8.0
    depends_on: [ snomed-lite ]
    environment:
      SNOMED_ADMIN_PASSWORD: ${SNOMED_ADMIN_PASSWORD}
    volumes:
      - ../data/snomed-ct/rf2:/data:ro
      - ../docker/snomed_loader.sh:/loader.sh:ro
    entrypoint: [ "/bin/sh","/loader.sh" ]
    networks:
      - backend

volumes:
  frontend_node_modules:
  snowstorm-lite-volume:

networks:
  backend:
    driver: bridge
